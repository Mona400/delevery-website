  <div class="container">
    <table  mat-table [dataSource]="payload" class="mat-elevation-z8 ">
      <!-- <th>Restaurant Name</th>
      <th>Start time</th>
      <th>Renew time</th>
      <th>Status</th>
      <th>Price</th>
      <th>Actions</th> -->
      <!--- Note that these columns can be defined in any order.
            The actual rendered columns are set as a property on the row definition" -->

      <!-- Position Column -->
      <ng-container matColumnDef="RestName" >
        <th mat-header-cell *matHeaderCellDef> Restaurant Name </th>
        <td mat-cell *matCellDef="let element">
          <div class="d-flex align-items-center justify-content-center">
            <img
                src="{{element.restaurantImg}}"
                alt=""
                style="width: 45px; height: 45px"
                class="rounded-circle"
                />
            <div class="ms-3">
              <p class="fw-bold mb-1">{{element.restaurantName}}</p>
            </div>
          </div>
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="Renew_time">
        <th mat-header-cell *matHeaderCellDef> Renew time </th>
        <td mat-cell *matCellDef="let element"  style="padding-block: 6vh;"> {{element.ExpirationDate | date:"longDate" }}  </td>
      </ng-container>

      <!-- Weight Column -->
      <ng-container matColumnDef="Status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element">
          <span  [ngClass]="{'btn-success': element.substate=='active', 'btn-danger': element.substate=='expired', 'btn-secondary': element.substate=='pending'}" style="text-transform: capitalize;" class="btn">{{element.substate}}</span>


        </td>
      </ng-container>

      <ng-container matColumnDef="Price">
        <th mat-header-cell *matHeaderCellDef> Price </th>
        <td mat-cell *matCellDef="let element"  style="font-size: 1.5rem;" >$ {{element.monthly_price}}</td>
      </ng-container>
      <ng-container matColumnDef="Actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element"> <div class="d-flex justify-content-center">
          <div class="example-button-container">
            <button data-toggle="modal" (click)="setSelected(element)" data-target="#exampleModalCenter2" mat-fab color="primary" aria-label="Example icon button with a delete icon">
              Edit
            </button>
          </div>
          <div class="example-button-container">
            <button (click)="deleteSub(element._id , element.substate)" mat-fab color="warn" aria-label="Example icon button with a delete icon">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </div> </td>
      </ng-container>
  <!--

      <ng-container matColumnDef="symbol">
        <th mat-header-cell *matHeaderCellDef> Symbol </th>
        <td mat-cell *matCellDef="let element"> {{element.symbol}} </td>
      </ng-container>
  -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

</div>


<!-- Modal -->
<div *ngIf="selected_sub" class="modal fade" id="exampleModalCenter2" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLongTitle">Modal title</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <h2 class="text-center fs-2">Arrival Dates</h2>
        <ng-template ngFor let-item [ngForOf]="selected_sub.meals" let-i="index" >

          <div class="lunch text-center">

            <h1 style="color: #ff4000; font-size: 1.5rem;">{{selected_sub.meals[i].title}}</h1>
            <img src="{{selected_sub.meals[i].image}}" width="300px" alt="" srcset="">
            <!-- <igx-time-picker
              #timePicker
              [(ngModel)]="selected_sub.Dates[i]"
                          [spinLoop]='false'
                          value="'16:14:00'" >
                  <label igxLabel>Time</label>
              </igx-time-picker> -->


            <mat-form-field>
              <input matInput
                    name="selected_time_A"
                    [(ngModel)]="selected_sub.Dates[i]"
                    [ngxMatTimepicker]="pickerA"

                    readonly />
              <mat-icon matSuffix
                        (click)="pickerA.open()">
                  watch_later
              </mat-icon>
            </mat-form-field>
            <ngx-mat-timepicker #pickerA></ngx-mat-timepicker>

          </div>
        </ng-template>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="button" (click)="updateSub()" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>
